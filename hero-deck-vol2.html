<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boss Hero Deck Vol.2 — 50 Unique Styles</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo+Black&family=Bebas+Neue&family=Chakra+Petch:wght@500;700&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,500;1,9..144,600&family=Fredoka:wght@500;600&family=JetBrains+Mono:wght@400;500;700&family=Monoton&family=Outfit:wght@300;400;500;600&family=Pirata+One&family=Space+Grotesk:wght@400;500;600;700&family=Unbounded:wght@500;700&display=swap" rel="stylesheet">
<style>

:root{
  --ink:#141327;
  --violet:#6d5bff; --violet-deep:#4a36e8;
  --gold-a:#f5d489; --gold-b:#c99b3f;
  --plum:#3a2f55;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Outfit',sans-serif;background:#0d0d16;color:var(--ink)}



.hero{display:block;min-height:100vh;min-height:100dvh;position:relative;overflow:hidden}
.wrap{max-width:1240px;margin:0 auto;padding:0 40px;position:relative;z-index:3}
.hero-grid{display:grid;grid-template-columns:1.05fr .95fr;gap:56px;align-items:center;min-height:100vh;padding:100px 0 90px}

/* style number plate */
.plate{position:absolute;bottom:20px;left:24px;z-index:9;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.24em;text-transform:uppercase;opacity:.55}

.eyebrow{display:inline-flex;align-items:center;gap:8px;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.22em;text-transform:uppercase;padding:8px 16px;border-radius:999px}
.eyebrow .dot{width:6px;height:6px;border-radius:50%}
.lede{font-size:17.5px;line-height:1.65;max-width:46ch;margin:26px 0 30px;font-weight:400}
.cta-row{display:flex;gap:14px;align-items:center;flex-wrap:wrap}
.btn{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:14px;letter-spacing:.04em;border-radius:999px;padding:15px 28px;cursor:pointer;border:0;transition:transform .2s,box-shadow .2s;text-decoration:none;display:inline-block}
.btn:hover{transform:translateY(-2px)}
.btn:focus-visible{outline:2px solid currentColor;outline-offset:3px}
.footnote{font-size:12.5px;margin-top:18px;opacity:.72;font-family:'JetBrains Mono',monospace;letter-spacing:.02em}

/* ---------- carousel core (markup injected by JS) ---------- */
.carousel-shell{position:relative}
.phone{width:300px;height:600px;border-radius:44px;padding:12px;position:relative;margin:0 auto}
.phone .notch{position:absolute;top:22px;left:50%;transform:translateX(-50%);width:96px;height:24px;border-radius:999px;z-index:5}
.screen-stack{position:relative;width:100%;height:100%;border-radius:34px;overflow:hidden}
.slide{position:absolute;inset:0;opacity:0;transform:scale(1.03);transition:opacity .6s ease,transform .6s ease;display:flex;flex-direction:column;padding:52px 22px 24px}
.slide.active{opacity:1;transform:scale(1)}
.dots{display:flex;gap:8px;justify-content:center;margin-top:22px}
.dots button{width:8px;height:8px;border-radius:99px;border:0;cursor:pointer;padding:0;transition:.3s}
.dots button.active{width:26px}
.car-arrows{position:absolute;top:50%;left:-14px;right:-14px;display:flex;justify-content:space-between;transform:translateY(-50%);pointer-events:none;z-index:6}
.car-arrows button{pointer-events:auto;width:40px;height:40px;border-radius:50%;border:0;cursor:pointer;font-size:16px;display:grid;place-items:center;transition:.2s}
.car-arrows button:hover{transform:scale(1.08)}
.slide-tag{position:absolute;bottom:-46px;left:0;right:0;text-align:center;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.18em;text-transform:uppercase;opacity:.65}

.app-top{display:flex;justify-content:space-between;align-items:center;font-family:'Space Grotesk',sans-serif;font-size:11px;letter-spacing:.14em;text-transform:uppercase;opacity:.8;margin-bottom:auto}
.verse-card{border-radius:20px;padding:22px;position:relative;overflow:hidden}
.verse-card .ref{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.2em;opacity:.7;margin-bottom:10px}
.verse-card .vtext{font-family:'Fraunces',serif;font-size:19px;line-height:1.45;font-weight:400}
.shimmer::after{content:"";position:absolute;inset:0;background:linear-gradient(105deg,transparent 40%,rgba(255,255,255,.35) 50%,transparent 60%);transform:translateX(-120%);animation:sweep 3.4s ease-in-out infinite}
@keyframes sweep{55%,100%{transform:translateX(120%)}}
.breath-wrap{display:grid;place-items:center;flex:1}
.breath{width:150px;height:150px;border-radius:50%;display:grid;place-items:center;animation:breathe 6s ease-in-out infinite}
.breath span{font-family:'Space Grotesk',sans-serif;font-size:12px;letter-spacing:.2em;text-transform:uppercase}
@keyframes breathe{0%,100%{transform:scale(.82)}50%{transform:scale(1.06)}}
.jwrap{flex:1;padding-top:28px}
.jline{height:10px;border-radius:99px;margin-bottom:14px;animation:grow 5s ease-in-out infinite}
.jline:nth-child(2){animation-delay:.35s}.jline:nth-child(3){animation-delay:.7s}.jline:nth-child(4){animation-delay:1.05s}
@keyframes grow{0%{width:8%;opacity:.4}45%,70%{width:var(--w,86%);opacity:1}100%{width:8%;opacity:.4}}
.app-cta{margin-top:auto;text-align:center;font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:600;letter-spacing:.1em;padding:13px;border-radius:14px}

h1 span.blk{display:block}



/* ---------- app shell: picker + stage ---------- */
html,body{height:100%;overflow:hidden;background:#0a0a12}
body{display:flex;flex-direction:column}

.deck-shell{display:grid;grid-template-rows:auto 1fr auto;height:100vh;height:100dvh}

.deck-top{
  z-index:50;flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;gap:16px;
  padding:10px 16px;background:rgba(10,10,18,.92);backdrop-filter:blur(16px);
  border-bottom:1px solid rgba(255,255,255,.08);color:#fff;
  font-family:'Space Grotesk',sans-serif;
}
.deck-top h1{font-size:14px;font-weight:600;letter-spacing:.04em;margin:0}
.deck-top h1 span{opacity:.55;font-weight:400;margin-left:8px;font-size:12px}
.deck-top .meta{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.08em;color:rgba(255,255,255,.55)}
.deck-top .nav{display:flex;gap:6px;align-items:center}
.deck-top .nav button{
  font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:600;
  border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.06);color:#fff;
  border-radius:999px;padding:7px 12px;cursor:pointer
}
.deck-top .nav button:hover{background:rgba(255,255,255,.12)}
.deck-top .nav button:focus-visible{outline:2px solid #8ab4ff;outline-offset:2px}

#stage{position:relative;overflow:auto;min-height:0;background:#0d0d16}
#stage .hero{min-height:100%}

.deck-dock{
  z-index:50;flex-shrink:0;
  background:rgba(10,10,18,.94);backdrop-filter:blur(18px);
  border-top:1px solid rgba(255,255,255,.1);
  padding:10px 12px 12px;color:#fff;
}
.dock-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;gap:12px}
.dock-head .label{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.5)}
.dock-head .active-name{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600}
.dock-head .active-name b{font-weight:600;color:#fff}
.dock-head .active-name span{color:rgba(255,255,255,.5);font-weight:400;margin-left:6px}

.tile-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(52px,1fr));
  gap:6px;
  max-height:148px;
  overflow:auto;
  padding:2px;
  scrollbar-width:thin;
  scrollbar-color:rgba(255,255,255,.2) transparent;
}
.tile{
  aspect-ratio:1;
  border:1px solid rgba(255,255,255,.1);
  border-radius:10px;
  cursor:pointer;
  position:relative;
  overflow:hidden;
  padding:0;
  background:#1a1a28;
  transition:transform .15s,border-color .15s,box-shadow .15s;
}
.tile:hover{transform:translateY(-2px);border-color:rgba(255,255,255,.35)}
.tile:focus-visible{outline:2px solid #8ab4ff;outline-offset:2px}
.tile.on{border-color:#fff;box-shadow:0 0 0 2px rgba(255,255,255,.35),0 8px 20px rgba(0,0,0,.4)}
.tile .sw{
  position:absolute;inset:0;
  background:
    linear-gradient(135deg,var(--s1) 0 34%,var(--s2) 34% 68%,var(--s3) 68%);
}
.tile .n{
  position:absolute;left:4px;top:3px;
  font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;
  color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.8);letter-spacing:.02em;
  z-index:1;
}
.tile .tip{
  position:absolute;left:0;right:0;bottom:0;
  font-family:'Space Grotesk',sans-serif;font-size:8px;font-weight:600;
  color:#fff;text-align:center;padding:10px 2px 3px;
  background:linear-gradient(transparent,rgba(0,0,0,.75));
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  z-index:1;
}

@media (max-width:960px){
  .hero-grid{grid-template-columns:1fr;gap:48px;padding:90px 0 70px}
  .wrap{padding:0 20px}
  .phone{width:260px;height:520px}
  .car-arrows{left:0;right:0}
  .tile-grid{max-height:120px;grid-template-columns:repeat(auto-fill,minmax(46px,1fr))}
  .deck-top h1 span{display:none}
}
@media (min-width:1100px){
  .tile-grid{grid-template-columns:repeat(25,minmax(0,1fr));max-height:none}
}

/* ============ No.01 POSTER CUT ============ */
#v1{background:radial-gradient(1100px 620px at 78% -10%,#e8efff 0%,transparent 60%),radial-gradient(900px 700px at -10% 100%,#dbe7ff 0%,transparent 55%),linear-gradient(160deg,#f2f6ff,#dfe9ff)}
#v1::before{content:"PEACE";position:absolute;right:-.06em;top:50%;transform:translateY(-50%);font-family:'Anton',sans-serif;font-size:min(34vw,470px);letter-spacing:-.02em;color:#fff;-webkit-text-stroke:2px #c9d7f4;z-index:1;line-height:1;user-select:none;text-shadow:14px 14px 0 rgba(109,91,255,.10)}
#v1 .grain{position:absolute;inset:0;z-index:2;opacity:.5;pointer-events:none;background-image:radial-gradient(rgba(20,19,39,.05) 1px,transparent 1px);background-size:22px 22px;mask-image:radial-gradient(closest-side at 40% 45%,black,transparent)}
#v1 .eyebrow{background:rgba(255,255,255,.6);border:1px solid rgba(109,91,255,.28);color:var(--violet-deep);backdrop-filter:blur(8px)}
#v1 .eyebrow .dot{background:var(--violet);box-shadow:0 0 0 4px rgba(109,91,255,.18)}
#v1 h1{font-family:'Anton',sans-serif;font-size:clamp(58px,7.4vw,104px);line-height:.96;text-transform:uppercase;margin-top:26px}
#v1 h1 .a{color:var(--ink);text-shadow:5px 5px 0 rgba(20,19,39,.14)}
#v1 h1 .b{color:#4f7dff;text-shadow:5px 5px 0 rgba(79,125,255,.28),10px 10px 0 rgba(79,125,255,.10)}
#v1 h1 .c{color:var(--violet);text-shadow:5px 5px 0 rgba(109,91,255,.30),10px 10px 0 rgba(109,91,255,.12);-webkit-text-stroke:1px rgba(255,255,255,.5)}
#v1 .lede{color:#3c3f57}
#v1 .btn-a{background:var(--violet);color:#fff;box-shadow:0 6px 0 var(--violet-deep),0 18px 34px rgba(109,91,255,.35)}
#v1 .btn-b{background:rgba(255,255,255,.65);color:var(--ink);border:1px solid rgba(20,19,39,.16);backdrop-filter:blur(8px);box-shadow:0 4px 0 rgba(20,19,39,.1)}
#v1 .footnote{color:#5b5f7d}
#v1 .glass-card{background:rgba(255,255,255,.42);border:1px solid rgba(255,255,255,.75);border-radius:36px;padding:26px 26px 30px;backdrop-filter:blur(22px) saturate(1.4);box-shadow:0 30px 60px rgba(60,70,140,.22),inset 0 1px 0 rgba(255,255,255,.9)}
#v1 .phone{background:linear-gradient(160deg,#1a1a2e,#2b2b4a);box-shadow:0 24px 50px rgba(30,35,90,.4)}
#v1 .phone .notch{background:#101020}
#v1 .screen-stack{background:#f4f7ff}
#v1 .s-verse{background:linear-gradient(170deg,#eef3ff,#dbe6ff)}
#v1 .s-verse .verse-card{background:#fff;box-shadow:0 12px 26px rgba(90,110,200,.18)}
#v1 .s-verse .ref{color:var(--violet-deep)}
#v1 .s-pray{background:linear-gradient(180deg,#171732,#232355);color:#fff}
#v1 .s-pray .breath{background:radial-gradient(circle,rgba(138,160,255,.5),rgba(138,160,255,.06) 70%);border:1px solid rgba(160,180,255,.5)}
#v1 .s-journal{background:linear-gradient(170deg,#fdfdff,#eef1fb)}
#v1 .s-journal .jline{background:linear-gradient(90deg,#c9d4f5,#aebdf0)}
#v1 .app-cta{background:var(--violet);color:#fff}
#v1 .dots button{background:rgba(20,19,39,.18)}
#v1 .dots button.active{background:var(--violet)}
#v1 .car-arrows button{background:rgba(255,255,255,.85);color:var(--ink);box-shadow:0 8px 20px rgba(60,70,140,.25)}
#v1 .plate{color:var(--ink)}

/* ============ No.02 VESPERS ============ */
#v2{background:radial-gradient(900px 500px at 85% 0%,rgba(120,110,255,.25),transparent 60%),radial-gradient(700px 700px at 10% 110%,rgba(245,212,137,.12),transparent 55%),linear-gradient(175deg,#141433,#232057 70%,#1b1840);color:#eef0ff}
#v2 .stars{position:absolute;inset:0;z-index:1;pointer-events:none;background-image:radial-gradient(rgba(255,255,255,.5) 1px,transparent 1.4px);background-size:160px 140px;opacity:.35;animation:twinkle 7s ease-in-out infinite alternate}
@keyframes twinkle{to{opacity:.15}}
#v2 .rays{position:absolute;top:-40%;left:30%;width:60%;height:180%;z-index:1;pointer-events:none;transform:rotate(18deg);background:linear-gradient(90deg,transparent,rgba(245,212,137,.06) 30%,rgba(245,212,137,.12) 50%,rgba(245,212,137,.06) 70%,transparent);filter:blur(8px)}
#v2 .eyebrow{background:rgba(245,212,137,.08);border:1px solid rgba(245,212,137,.35);color:var(--gold-a)}
#v2 .eyebrow .dot{background:var(--gold-a);box-shadow:0 0 12px rgba(245,212,137,.8)}
#v2 h1{font-family:'Fraunces',serif;font-weight:600;font-size:clamp(52px,6.6vw,92px);line-height:1.04;letter-spacing:-.01em;margin-top:28px}
#v2 h1 em{font-style:italic;font-weight:400}
#v2 h1 .a{color:#f2f3ff;text-shadow:0 2px 0 rgba(0,0,10,.55),0 14px 34px rgba(0,0,30,.6)}
#v2 h1 .b{background:linear-gradient(178deg,#fbe7ae 10%,var(--gold-a) 40%,var(--gold-b) 78%,#8a6420);-webkit-background-clip:text;background-clip:text;color:transparent;filter:drop-shadow(0 2px 0 rgba(60,40,0,.55)) drop-shadow(0 12px 26px rgba(245,212,137,.28))}
#v2 .lede{color:#c3c6e8}
#v2 .btn-a{background:linear-gradient(180deg,#fbe7ae,var(--gold-b));color:#241c04;box-shadow:0 2px 0 rgba(255,255,255,.55) inset,0 14px 30px rgba(245,212,137,.28)}
#v2 .btn-b{background:rgba(255,255,255,.06);color:#eef0ff;border:1px solid rgba(255,255,255,.22);backdrop-filter:blur(10px)}
#v2 .footnote{color:#8f93bd}
#v2 .glass-card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.16);border-radius:36px;padding:26px 26px 30px;backdrop-filter:blur(20px);box-shadow:0 40px 80px rgba(0,0,20,.5),inset 0 1px 0 rgba(255,255,255,.22)}
#v2 .phone{background:linear-gradient(160deg,#0c0c1c,#1c1a38);box-shadow:0 30px 60px rgba(0,0,20,.6),0 0 0 1px rgba(245,212,137,.18)}
#v2 .phone .notch{background:#07070f}
#v2 .screen-stack{background:#12122a}
#v2 .s-verse{background:linear-gradient(180deg,#181736,#100f26);color:#eef0ff}
#v2 .s-verse .verse-card{background:rgba(245,212,137,.08);border:1px solid rgba(245,212,137,.3)}
#v2 .s-verse .ref{color:var(--gold-a)}
#v2 .s-pray{background:radial-gradient(circle at 50% 35%,#26234f,#0f0e24);color:#eef0ff}
#v2 .s-pray .breath{background:radial-gradient(circle,rgba(245,212,137,.35),rgba(245,212,137,.04) 70%);border:1px solid rgba(245,212,137,.45)}
#v2 .s-journal{background:linear-gradient(180deg,#161533,#0f0e24);color:#eef0ff}
#v2 .s-journal .jline{background:linear-gradient(90deg,rgba(245,212,137,.55),rgba(245,212,137,.2))}
#v2 .app-cta{background:linear-gradient(180deg,#fbe7ae,var(--gold-b));color:#241c04}
#v2 .dots button{background:rgba(255,255,255,.22)}
#v2 .dots button.active{background:var(--gold-a)}
#v2 .car-arrows button{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.2);backdrop-filter:blur(8px)}

/* ============ No.03 STILL WATER ============ */
#v3{background:radial-gradient(1000px 600px at 20% 0%,#f3efe7 0%,transparent 55%),radial-gradient(1000px 700px at 95% 90%,#dfe4f5 0%,transparent 55%),linear-gradient(150deg,#f7f4ef,#e9edf7)}
#v3 .blob{position:absolute;border-radius:50%;filter:blur(70px);z-index:1;pointer-events:none;animation:drift 16s ease-in-out infinite alternate}
#v3 .blob.b1{width:420px;height:420px;background:rgba(140,150,235,.28);top:-90px;right:16%}
#v3 .blob.b2{width:360px;height:360px;background:rgba(214,178,120,.22);bottom:-60px;left:8%;animation-delay:-6s}
@keyframes drift{to{transform:translate(40px,30px) scale(1.08)}}
#v3 .eyebrow{background:rgba(255,255,255,.55);border:1px solid rgba(58,47,85,.16);color:var(--plum);backdrop-filter:blur(10px);box-shadow:0 6px 18px rgba(58,47,85,.08)}
#v3 .eyebrow .dot{background:#8b7bd8}
#v3 h1{font-family:'Fraunces',serif;font-weight:700;font-size:clamp(54px,6.8vw,96px);line-height:1.02;letter-spacing:-.015em;color:var(--plum);margin-top:28px;text-shadow:0 1px 0 #fff,0 2px 0 rgba(255,255,255,.7),0 3px 2px rgba(58,47,85,.14),0 16px 34px rgba(58,47,85,.16)}
#v3 h1 em{font-style:italic;font-weight:400;color:#8b7bd8;text-shadow:0 1px 0 #fff,0 3px 2px rgba(139,123,216,.28),0 16px 34px rgba(139,123,216,.3)}
#v3 .lede{color:#565170}
#v3 .btn-a{background:var(--plum);color:#fdfcf9;box-shadow:0 1px 0 rgba(255,255,255,.4) inset,0 16px 34px rgba(58,47,85,.3)}
#v3 .btn-b{background:rgba(255,255,255,.6);color:var(--plum);border:1px solid rgba(58,47,85,.14);backdrop-filter:blur(10px);box-shadow:0 8px 22px rgba(58,47,85,.1)}
#v3 .footnote{color:#7a7492}
#v3 .glass-card{background:rgba(255,255,255,.34);border:1px solid rgba(255,255,255,.85);border-radius:40px;padding:26px 26px 30px;backdrop-filter:blur(26px) saturate(1.5);box-shadow:0 34px 70px rgba(90,85,140,.22),inset 0 2px 0 rgba(255,255,255,1)}
#v3 .phone{background:linear-gradient(160deg,#efece4,#d9d6e6);box-shadow:0 24px 50px rgba(90,85,140,.3),inset 0 1px 0 #fff}
#v3 .phone .notch{background:#c8c4d6}
#v3 .screen-stack{background:#fbfaf7}
#v3 .s-verse{background:linear-gradient(175deg,#fdfcf9,#eef0fa);color:var(--plum)}
#v3 .s-verse .verse-card{background:#fff;box-shadow:0 14px 30px rgba(90,85,140,.14)}
#v3 .s-verse .ref{color:#8b7bd8}
#v3 .s-pray{background:linear-gradient(180deg,#3b3560,#221e3d);color:#f4f2ff}
#v3 .s-pray .breath{background:radial-gradient(circle,rgba(196,184,255,.45),rgba(196,184,255,.05) 70%);border:1px solid rgba(196,184,255,.5)}
#v3 .s-journal{background:linear-gradient(175deg,#fdfcf9,#f1eee6);color:var(--plum)}
#v3 .s-journal .jline{background:linear-gradient(90deg,#d9d2ea,#c4b8e6)}
#v3 .app-cta{background:var(--plum);color:#fdfcf9}
#v3 .dots button{background:rgba(58,47,85,.2)}
#v3 .dots button.active{background:#8b7bd8}
#v3 .car-arrows button{background:rgba(255,255,255,.9);color:var(--plum);box-shadow:0 10px 24px rgba(90,85,140,.22)}

/* ============ No.04 TERMINAL BLOOM (bioluminescent console) ============ */
#v4{background:radial-gradient(1000px 700px at 80% 10%,rgba(77,232,255,.08),transparent 55%),radial-gradient(800px 600px at 5% 95%,rgba(125,255,212,.07),transparent 55%),linear-gradient(170deg,#04100d,#071c17 60%,#051411);color:#d8fff2}
#v4 .scan{position:absolute;inset:0;z-index:1;pointer-events:none;background:repeating-linear-gradient(0deg,rgba(125,255,212,.03) 0 1px,transparent 1px 4px)}
#v4 .glowline{position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(125,255,212,.5),transparent);top:0;z-index:2;animation:scanmove 9s linear infinite;filter:blur(1px)}

#1a1c22", "#c8ccd8", "#8a90a0"], "blurb": "Moon grey silver"}, {"id": "v50", "n": 50, "name": "Prism Split", "sw": ["#0e0e18", "#ff4d6a", "#4d9fff"], "blurb": "Rainbow light refraction"}];
const stage = document.getElementById('stage');
const grid = document.getElementById('tileGrid');
const activeName = document.getElementById('activeName');
const countMeta = document.getElementById('countMeta');
let current = 0;
let carTimer = null;

// Build tile grid once
THEMES.forEach((t, i) => {
  const b = document.createElement('button');
  b.type = 'button';
  b.className = 'tile' + (i === 0 ? ' on' : '');
  b.role = 'option';
  b.setAttribute('aria-selected', i === 0 ? 'true' : 'false');
  b.dataset.i = i;
  b.title = String(t.n).padStart(2,'0') + ' — ' + t.name + '\n' + t.blurb;
  b.innerHTML = `<span class="sw" style="--s1:${t.sw[0]};--s2:${t.sw[1]};--s3:${t.sw[2]||t.sw[0]}"></span><span class="n">${String(t.n).padStart(2,'0')}</span><span class="tip">${t.name}</span>`;
  b.addEventListener('click', () => loadTheme(i));
  grid.appendChild(b);
});

function stopCarousel() {
  if (carTimer) { clearInterval(carTimer); carTimer = null; }
}

function initCarousel(root) {
  stopCarousel();
  const TAGS = ['Daily verse — swap in your GIF','Guided prayer — swap in your GIF','Journal — swap in your GIF'];
  root.querySelectorAll('[data-carousel]').forEach(shell => {
    const d = shell.dataset;
    shell.innerHTML = `
    <div class="phone"><div class="notch"></div>
      <div class="screen-stack">
        <div class="slide s-verse active">
          <div class="app-top"><span>${d.top}</span><span>${d.icon}</span></div>
          <div class="verse-card shimmer"><div class="ref">${d.ref}</div><div class="vtext">${d.verse}</div></div>
          <div class="app-cta">Read the passage</div>
        </div>
        <div class="slide s-pray">
          <div class="app-top"><span>Guided prayer</span><span>4:00</span></div>
          <div class="breath-wrap"><div class="breath"><span>${d.word}</span></div></div>
          <div class="app-cta">Pray with structure</div>
        </div>
        <div class="slide s-journal">
          <div class="app-top"><span>Journal</span><span>Day 12</span></div>
          <div class="jwrap">
            <div class="jline" style="--w:88%"></div><div class="jline" style="--w:70%"></div>
            <div class="jline" style="--w:80%"></div><div class="jline" style="--w:52%"></div>
          </div>
          <div class="app-cta">Save a reflection</div>
        </div>
      </div>
    </div>
    <div class="car-arrows"><button type="button" data-prev aria-label="Previous screen">‹</button><button type="button" data-next aria-label="Next screen">›</button></div>
    <div class="dots" role="tablist"></div>
    <div class="slide-tag" data-tag>${TAGS[0]}</div>`;

    const slides = [...shell.querySelectorAll('.slide')];
    const dotsWrap = shell.querySelector('.dots');
    const tag = shell.querySelector('[data-tag]');
    let i = 0;
    slides.forEach((_, k) => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.setAttribute('aria-label', 'Go to screen ' + (k + 1));
      if (k === 0) btn.classList.add('active');
      btn.addEventListener('click', () => { go(k); reset(); });
      dotsWrap.appendChild(btn);
    });
    const dots = [...dotsWrap.children];
    function go(n) {
      i = (n + slides.length) % slides.length;
      slides.forEach((s, k) => s.classList.toggle('active', k === i));
      dots.forEach((dd, k) => dd.classList.toggle('active', k === i));
      tag.textContent = TAGS[i];
    }
    function reset() {
      stopCarousel();
      carTimer = setInterval(() => go(i + 1), 4200);
    }
    shell.querySelector('[data-prev]').addEventListener('click', () => { go(i - 1); reset(); });
    shell.querySelector('[data-next]').addEventListener('click', () => { go(i + 1); reset(); });
    reset();
  });
}

function loadTheme(index) {
  if (index < 0) index = THEMES.length - 1;
  if (index >= THEMES.length) index = 0;
  current = index;
  const t = THEMES[current];
  const tpl = document.getElementById('tpl-' + t.id);
  if (!tpl) return;

  // Resourceful: only one hero in the DOM
  stopCarousel();
  stage.replaceChildren(tpl.content.cloneNode(true));
  stage.scrollTop = 0;
  initCarousel(stage);

  // UI state
  countMeta.textContent = String(t.n).padStart(2,'0') + ' / 50';
  activeName.innerHTML = `<b>${String(t.n).padStart(2,'0')} — ${t.name}</b><span>${t.blurb}</span>`;
  grid.querySelectorAll('.tile').forEach((el, i) => {
    const on = i === current;
    el.classList.toggle('on', on);
    el.setAttribute('aria-selected', on ? 'true' : 'false');
  });
  // Keep active tile visible in the dock
  const onTile = grid.children[current];
  if (onTile) onTile.scrollIntoView({ block: 'nearest', inline: 'nearest' });

  // Hash for shareable deep-link
  history.replaceState(null, '', '#' + t.id);
}

document.getElementById('btnPrev').addEventListener('click', () => loadTheme(current - 1));
document.getElementById('btnNext').addEventListener('click', () => loadTheme(current + 1));

// Keyboard: ← → to switch designs
window.addEventListener('keydown', (e) => {
  if (e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA')) return;
  if (e.key === 'ArrowLeft') { e.preventDefault(); loadTheme(current - 1); }
  if (e.key === 'ArrowRight') { e.preventDefault(); loadTheme(current + 1); }
});

// Boot from hash or first theme
const boot = (() => {
  const h = (location.hash || '').replace('#','');
  const idx = THEMES.findIndex(t => t.id === h);
  return idx >= 0 ? idx : 0;
})();
loadTheme(boot);
</script>
