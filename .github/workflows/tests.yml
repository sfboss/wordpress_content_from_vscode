name: Core stability suite

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install package and test dependencies
        run: python -m pip install -e '.[dev]'
      - name: Run deterministic non-live core suite
        run: python -m pytest -m "not live" --cov=wp_factory --cov-branch --cov-report=term-missing --cov-fail-under=30
